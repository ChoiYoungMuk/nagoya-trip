<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>나고야 가족여행 | 2026.06.19 - 06.22</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --soft: #f3f4f6;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --danger: #ef4444;
      --shadow: 0 8px 24px rgba(17, 24, 39, .06);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 14px 14px 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -14px -14px 12px;
      padding: 14px;
      background: rgba(246, 247, 249, .92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(229, 231, 235, .8);
    }

    .topbar-inner {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 8px;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }


    .travel-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .plane-badge {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border: 1px solid #bfdbfe;
      color: var(--accent);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .12);
    }

    .plane-emoji {
      display: inline-block;
      font-size: 24px;
      line-height: 1;
      transform: rotate(-8deg);
    }

    .route-dot {
      color: var(--accent);
      font-weight: 900;
      padding: 0 2px;
    }

    .right-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dday {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #dbeafe;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .sync {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .panel {
      background: var(--card);
      border: 1px solid #dfe3e8;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 18px;
      margin-bottom: 12px;
    }

    .intro-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .intro-title strong {
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }


    .add-toggle {
      width: 100%;
      margin-bottom: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .form.collapsed {
      display: none;
    }

    .close-form {
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .form {
      padding: 14px;
      margin-bottom: 12px;
    }

    .form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .form-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.03em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .field {
      min-width: 0;
    }

    .field.full,
    .field.place,
    .field.map,
    .field.blog,
    .field.memo {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .field.memo textarea {
      min-height: 56px;
    }

    input,
    select,
    textarea {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 56px;
      resize: vertical;
      display: block;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .10);
    }

    .primary {
      width: 100%;
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-weight: 900;
    }

    .days {
      display: grid;
      gap: 10px;
    }

    .day {
      overflow: hidden;
    }

    .day-summary {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #f8fafc;
      color: var(--text);
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .day-summary-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .day-title {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .day-title::before {
      content: "";
      width: 4px;
      height: 18px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
    }

    .day-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chevron {
      color: var(--muted);
      font-weight: 900;
      transition: transform .2s ease;
    }

    .day[data-open="true"] .chevron {
      transform: rotate(90deg);
    }

    .items {
      display: none;
      padding: 10px 12px 12px;
      background: #ffffff;
    }

    .day[data-open="true"] .items {
      display: block;
    }

    .item {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 12px;
      padding: 13px;
      margin-bottom: 9px;
      border: 1px solid #edf0f3;
      border-radius: 14px;
      background: #ffffff;
    }

    .item:last-child {
      margin-bottom: 0;
    }

    .time {
      align-self: start;
      display: inline-flex;
      justify-content: center;
      width: 112px;
      padding: 8px 7px;
      border-radius: 12px;
      background: var(--soft);
      color: #374151;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .item-title {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .memo {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--soft);
      color: #374151;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .action.map {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .action.delete {
      background: #fef2f2;
      color: var(--danger);
    }

    .action:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .empty {
      padding: 14px 4px 2px;
      color: var(--muted);
      font-size: 14px;
    }


    .plane-button {
      border: 0;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .plane-button:active {
      transform: scale(.96);
    }

    .travel-photo-layer {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(17, 24, 39, .36);
      backdrop-filter: blur(7px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }

    .travel-photo-layer.show {
      opacity: 1;
      pointer-events: auto;
    }

    .travel-photo-card {
      width: min(360px, 86vw);
      overflow: hidden;
      border-radius: 26px;
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(0, 0, 0, .24);
      transform: translateY(16px) scale(.94);
      opacity: 0;
      transition: transform .45s cubic-bezier(.2, .9, .2, 1), opacity .35s ease;
    }

    .travel-photo-layer.show .travel-photo-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .travel-photo-card img {
      display: block;
      width: 100%;
      height: min(430px, 62vh);
      object-fit: cover;
      background: #f3f4f6;
    }

    /* .travel-photo-caption {
      padding: 13px 15px 15px;
      text-align: center;
    } */

    .travel-photo-caption strong {
      display: block;
      font-size: 16px;
      letter-spacing: -.03em;
      color: var(--text);
    }

    .travel-photo-caption span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      background: #111827;
      color: #fff;
      padding: 11px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      z-index: 99;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .18);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px 10px 28px;
      }

      .topbar {
        margin: -12px -10px 10px;
        padding: 12px 14px;
      }

      .topbar-inner {
        padding: 0 6px;
      }

      .travel-brand {
        gap: 10px;
        min-width: 0;
      }

      .plane-badge {
        width: 38px;
        height: 38px;
        min-width: 38px;
        border-radius: 13px;
      }

      .plane-emoji {
        font-size: 22px;
      }

      .right-status {
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
      }

      .dday {
        padding: 6px 8px;
        font-size: 11px;
      }


      .brand h1 {
        font-size: 20px;
      }

      .sync {
        padding: 7px 9px;
      }

      .intro {
        padding: 15px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .field:first-child,
      .field.place,
      .field.map,
      .field.blog,
      .field.memo {
        grid-column: 1 / -1;
      }

      .item {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px;
      }

      .time {
        width: auto;
        justify-content: flex-start;
        padding: 7px 9px;
      }

      .actions {
        gap: 6px;
      }

      .field.memo textarea {
        min-height: 54px;
      }

      .action {
        min-height: 32px;
        padding: 7px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand travel-brand">
        <button class="plane-badge plane-button" type="button" onclick="showTravelPhoto()" aria-label="여행 사진 보기">
          <span class="plane-emoji">✈</span>
        </button>
        <div>
          <h1>나고야 가족여행</h1>
          <p>인천 <span class="route-dot">→</span> 나고야 · 2026.06.19 ~ 06.22</p>
        </div>
      </div>
      <div class="right-status">
        <div class="dday" id="ddayBadge">D-Day</div>
        <div class="sync"><span class="dot"></span><span id="syncText">동기화</span></div>
      </div>
    </div>
  </div>

  <main class="app">
    <section class="intro panel">
      <div class="intro-title">
        <strong>여행 일정표</strong>
        <span class="badge">3박 4일</span>
      </div>
      <p>가족과 함께 보는 일정표입니다. 장소를 추가하고, 구글맵 주소나 검색어를 넣으면 지도 버튼으로 연결됩니다.</p>
    </section>

    <button class="add-toggle" id="addToggle" onclick="toggleForm()">＋ 일정 추가</button>

    <section class="form panel collapsed" id="addForm">
      <div class="form-head">
        <h2>일정 추가</h2>
        <button class="close-form" onclick="toggleForm(false)" type="button">닫기</button>
      </div>

      <div class="grid">
        <div class="field">
          <label for="date">날짜</label>
          <select id="date">
            <option value="2026-06-19">6/19 금</option>
            <option value="2026-06-20">6/20 토</option>
            <option value="2026-06-21">6/21 일</option>
            <option value="2026-06-22">6/22 월</option>
          </select>
        </div>

        <div class="field">
          <label for="time">시작</label>
          <input id="time" type="time" value="10:00" step="60" />
        </div>

        <div class="field">
          <label for="endTime">종료</label>
          <input id="endTime" type="time" step="60" />
        </div>

        <div class="field place">
          <label for="title">장소/일정명</label>
          <input id="title" placeholder="예: 나고야성" />
        </div>

        <div class="field map">
          <label for="map">Google Maps 주소 또는 검색어</label>
          <input id="map" placeholder="선택 입력" />
        </div>

        <div class="field blog">
          <label for="blog">블로그 URL</label>
          <input id="blog" placeholder="선택 입력" />
        </div>

        <div class="field memo">
          <label for="memo">메모</label>
          <textarea id="memo" placeholder="예약번호, 이동수단, 식사 후보 등을 적어두세요."></textarea>
        </div>
      </div>

      <button class="primary" onclick="addItem()">＋ 일정 추가</button>
    </section>

    <section class="days" id="days"></section>
  </main>


  <div id="travelPhotoLayer" class="travel-photo-layer" onclick="hideTravelPhoto()">
    <div class="travel-photo-card" onclick="event.stopPropagation()">
      <img id="travelPhotoImage" src="./images/nagoya-castle-01.jpg" alt="여행 사진" />
      <!-- <div class="travel-photo-caption">
        <strong id="travelPhotoTitle">나고야 가족여행</strong>
        <span id="travelPhotoSub">비행기 아이콘을 누르면 랜덤 사진이 나와요</span>
      </div> -->
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby0FcDhO69qMok8RCC3UBhCf_q-x5AnjVFkRpEXmsdVvdWAgAcO2sijj36KEx9Gnj90/exec";
    const DAYS = [
      ["2026-06-19", "6/19 금요일", "1일차"],
      ["2026-06-20", "6/20 토요일", "2일차"],
      ["2026-06-21", "6/21 일요일", "3일차"],
      ["2026-06-22", "6/22 월요일", "4일차"]
    ];

    let cachedItems = [];
    let isFirstLoad = true;

    function setSync(text, ok = true) {
      const sync = document.getElementById("syncText");
      const dot = document.querySelector(".dot");
      if (sync) sync.textContent = text;
      if (dot) dot.style.background = ok ? "#22c55e" : "#f59e0b";
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1600);
    }

    function sortItems(items) {
      return items.sort((a, b) =>
        String((a.date || "") + (a.time || "")).localeCompare(String((b.date || "") + (b.time || "")))
      );
    }

    async function load() {
      setSync("불러오는 중", false);
      const res = await fetch(API_URL, { cache: "no-store" });
      const data = await res.json();
      cachedItems = sortItems(data.map(normalizeItem));
      isFirstLoad = false;
      setSync("동기화됨", true);
      return cachedItems;
    }

    function normalizeItem(item) {
      return {
        id: String(item.id || ""),
        date: String(item.date || ""),
        time: normalizeTime(item.time),
        endTime: normalizeTime(item.endTime || ""),
        title: String(item.title || ""),
        map: String(item.map || ""),
        blog: String(item.blog || item.blogUrl || ""),
        memo: String(item.memo || "")
      };
    }

    function normalizeTime(value) {
      const text = String(value || "");
      const match = text.match(/(\d{1,2}):(\d{2})/);
      if (match) return match[1].padStart(2, "0") + ":" + match[2];
      return text.slice(0, 5);
    }

    function displayTimeRange(item) {
      const start = item.time || "--:--";
      const end = item.endTime || "";
      return end ? `${start} ~ ${end}` : start;
    }

    function mapsUrl(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (text.startsWith("http://") || text.startsWith("https://")) return text;
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(text);
    }

    function normalUrl(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (text.startsWith("http://") || text.startsWith("https://")) return text;
      return "https://" + text;
    }

    async function addToServer(item) {
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(item)
      });
    }

    async function addItem() {
      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value || "",
        endTime: document.getElementById("endTime").value || "",
        title: document.getElementById("title").value.trim(),
        map: document.getElementById("map").value.trim(),
        blog: document.getElementById("blog").value.trim(),
        memo: document.getElementById("memo").value.trim()
      };

      if (!item.title) {
        toast("장소/일정명을 입력해주세요.");
        return;
      }

      if (item.endTime && item.endTime < item.time) {
        toast("종료시간은 시작시간보다 늦게 선택해주세요.");
        return;
      }

      cachedItems.push(item);
      sortItems(cachedItems);
      renderFromCache();

      document.getElementById("endTime").value = "";
      document.getElementById("title").value = "";
      document.getElementById("map").value = "";
      document.getElementById("blog").value = "";
      document.getElementById("memo").value = "";

      toast("일정을 추가했어요. 동기화 중...");
      setSync("저장 중", false);

      try {
        await addToServer(item);
        await load();
        renderFromCache();
        toggleForm(false);
        toast("저장됐어요.");
      } catch (error) {
        cachedItems = cachedItems.filter(x => String(x.id) !== String(item.id));
        renderFromCache();
        setSync("동기화 확인 필요", false);
        toast("저장 실패. 다시 시도해주세요.");
      }
    }

    async function deleteItem(id) {
      if (!confirm("이 일정을 삭제할까요?")) return;

      const before = [...cachedItems];
      cachedItems = cachedItems.filter(x => String(x.id) !== String(id));
      renderFromCache();

      toast("삭제했어요. 동기화 중...");
      setSync("삭제 중", false);

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "delete", id })
        });

        await load();
        renderFromCache();
        toast("반영됐어요.");
      } catch (error) {
        cachedItems = before;
        renderFromCache();
        setSync("동기화 확인 필요", false);
        toast("삭제 실패. 다시 시도해주세요.");
      }
    }

    async function editItem(id) {
      const items = cachedItems.length ? cachedItems : await load();
      const item = items.find(x => String(x.id) === String(id));
      if (!item) return;

      document.getElementById("date").value = item.date;
      document.getElementById("time").value = item.time;
      document.getElementById("endTime").value = item.endTime || "";
      document.getElementById("title").value = item.title;
      document.getElementById("map").value = item.map;
      document.getElementById("blog").value = item.blog || "";
      document.getElementById("memo").value = item.memo;

      const before = [...cachedItems];
      cachedItems = cachedItems.filter(x => String(x.id) !== String(id));
      renderFromCache();

      setSync("수정 준비 중", false);

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "delete", id })
        });

        await load();
        renderFromCache();
        toggleForm(true);
        document.getElementById("addForm").scrollIntoView({ behavior: "smooth", block: "start" });
        toast("내용 수정 후 다시 추가하세요.");
      } catch (error) {
        cachedItems = before;
        renderFromCache();
        setSync("동기화 확인 필요", false);
        toast("수정 준비 실패. 다시 시도해주세요.");
      }
    }

    function toggleForm(force) {
      const form = document.getElementById("addForm");
      const button = document.getElementById("addToggle");
      if (!form || !button) return;

      const shouldOpen = typeof force === "boolean"
        ? force
        : form.classList.contains("collapsed");

      form.classList.toggle("collapsed", !shouldOpen);
      button.style.display = shouldOpen ? "none" : "block";

      if (shouldOpen) {
        setTimeout(() => {
          document.getElementById("title")?.focus();
        }, 120);
      }
    }

    function toggleDay(date) {
      const el = document.querySelector(`[data-date="${date}"]`);
      if (!el) return;
      el.dataset.open = el.dataset.open === "true" ? "false" : "true";
    }

    async function render() {
      if (isFirstLoad) {
        document.getElementById("days").innerHTML =
          `<section class="day panel"><div class="empty">일정을 불러오는 중입니다...</div></section>`;
        await load();
      }
      renderFromCache();
    }

    function renderFromCache() {
      const root = document.getElementById("days");
      root.innerHTML = "";

      for (const [date, label, sub] of DAYS) {
        const dayItems = cachedItems.filter(x => x.date === date);
        const day = document.createElement("section");
        day.className = "day panel";
        day.dataset.date = date;
        day.dataset.open = dayItems.length ? "true" : "false";

        day.innerHTML = `
          <button class="day-summary" onclick="toggleDay('${date}')">
            <span class="day-summary-left">
              <span class="day-title">${label}</span>
              <span class="day-sub">${sub} · ${dayItems.length}개 일정</span>
            </span>
            <span class="chevron">›</span>
          </button>
          <div class="items"></div>
        `;

        const itemsEl = day.querySelector(".items");

        if (!dayItems.length) {
          itemsEl.innerHTML = `<div class="empty">아직 일정이 없습니다.</div>`;
        } else {
          for (const item of dayItems) {
            const row = document.createElement("article");
            row.className = "item";

            const mapValue = String(item.map || "").trim();
            const blogValue = String(item.blog || "").trim();
            const mapActions = mapValue
              ? `<a class="action map" target="_blank" rel="noopener" href="${mapsUrl(mapValue)}">지도</a>`
              : `<button class="action" disabled title="Google Maps 주소가 없습니다.">지도 없음</button>`;
            const blogAction = blogValue
              ? `<a class="action" target="_blank" rel="noopener" href="${normalUrl(blogValue)}">블로그</a>`
              : `<button class="action" disabled title="블로그 URL이 없습니다.">블로그 없음</button>`;

            row.innerHTML = `
              <div class="time">${escapeHtml(displayTimeRange(item))}</div>
              <div>
                <p class="item-title">${escapeHtml(item.title)}</p>
                <p class="memo">${escapeHtml(item.memo || "메모 없음")}</p>
                <div class="actions">
                  ${mapActions}
                  ${blogAction}
                  <button class="action" onclick="editItem('${escapeAttr(item.id)}')">수정</button>
                  <button class="action delete" onclick="deleteItem('${escapeAttr(item.id)}')">삭제</button>
                </div>
              </div>
            `;
            itemsEl.appendChild(row);
          }
        }

        root.appendChild(day);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[s]));
    }

    function escapeAttr(str) {
      return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }


    function updateDday() {
      const badge = document.getElementById("ddayBadge");
      if (!badge) return;

      const today = new Date();
      const start = new Date("2026-06-19T00:00:00+09:00");
      const diff = Math.ceil((start - today) / (1000 * 60 * 60 * 24));

      if (diff > 0) {
        badge.textContent = `D-${diff}`;
      } else if (diff === 0) {
        badge.textContent = "D-Day";
      } else {
        badge.textContent = "여행 중";
      }
    }


    const TRAVEL_PHOTOS = [
      {
        src: "./images/nagoya-castle-01.jpg",
        title: "나고야성",
        sub: "인천에서 나고야까지, 가족여행 시작!"
      }

      // 나중에 사진을 추가할 때는 아래처럼 images 폴더에 넣고 배열에 추가하면 됩니다.
      // { src: "./images/nagoya-castle-02.jpg", title: "나고야", sub: "여행 사진" },
      // { src: "./images/nephew-01.jpg", title: "우리 조카", sub: "여행의 귀여운 주인공" },
      // { src: "./images/nephew-02.jpg", title: "우리 조카", sub: "랜덤으로 등장!" },
    ];

    let photoTimer = null;
    let lastPhotoIndex = -1;

    function pickRandomPhoto() {
      if (TRAVEL_PHOTOS.length === 1) return TRAVEL_PHOTOS[0];

      let index = Math.floor(Math.random() * TRAVEL_PHOTOS.length);
      if (index === lastPhotoIndex) {
        index = (index + 1) % TRAVEL_PHOTOS.length;
      }
      lastPhotoIndex = index;
      return TRAVEL_PHOTOS[index];
    }

    function showTravelPhoto() {
      const photo = pickRandomPhoto();
      const layer = document.getElementById("travelPhotoLayer");
      const image = document.getElementById("travelPhotoImage");
      const title = document.getElementById("travelPhotoTitle");
      const sub = document.getElementById("travelPhotoSub");

      if (!layer || !image || !title || !sub) return;

      image.src = photo.src;
      title.textContent = photo.title;
      sub.textContent = photo.sub;

      clearTimeout(photoTimer);
      layer.classList.add("show");

      photoTimer = setTimeout(() => {
        hideTravelPhoto();
      }, 2600);
    }

    function hideTravelPhoto() {
      const layer = document.getElementById("travelPhotoLayer");
      if (!layer) return;
      layer.classList.remove("show");
      clearTimeout(photoTimer);
    }

    window.addEventListener("DOMContentLoaded", () => {
      updateDday();
      render();
    });
  </script>
</body>

</html>
