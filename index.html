<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>나고야 가족여행 | 2026.06.19 - 06.22</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --bg2: #ffffff;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #bdd600;
      --accent2: #9bc700;
      --blue: #172a55;
      --green: #bdd600;
      --danger: #ef4444;
      --shadow: 0 8px 24px rgba(17, 24, 39, .08);
      --radius: 16px;
    }

    [data-theme="night"] {
      --bg: #0f172a;
      --bg2: #1e1b4b;
      --card: rgba(15, 23, 42, .78);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(148, 163, 184, .25);
      --accent: #fb7185;
      --accent2: #fbbf24;
      --blue: #60a5fa;
      --green: #34d399;
      --danger: #f87171;
      --shadow: 0 20px 70px rgba(0, 0, 0, .34);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 0 14px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #ffffff 50%, #172a55 50%, #172a55 100%);
      border-bottom: 1px solid #e5e7eb;
    }

    .hero-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: center;
      padding-top: 18px;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: 22px 22px 20px;
      border-top: 5px solid var(--accent);
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef7c6;
      color: #4b5f00;
      font-weight: 800;
      font-size: 12px;
      margin-bottom: 14px;
      letter-spacing: .02em;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero-copy p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
      margin: 16px 0 0;
    }

    .hero-art {
      display: none;
    }

    .hero-art svg {
      width: 100%;
      max-width: 460px;
      filter: drop-shadow(0 22px 28px rgba(120, 53, 15, .18));
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .5);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    .toolbar {
      display: none;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 12px;
      font: inherit;
      background: #ffffff;
      color: #111827;
      outline: none;
    }

    textarea {
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #bdd600;
      box-shadow: 0 0 0 3px rgba(189, 214, 0, .18);
    }

    button,
    .button {
      border: 0;
      background: #172a55;
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
      box-shadow: none;
    }

    button.secondary,
    .button.secondary {
      background: #475467;
      box-shadow: none;
    }

    button.ghost,
    .button.ghost {
      background: #eef2f7;
      color: #172a55;
      box-shadow: none;
    }

    button.danger {
      background: var(--danger);
      box-shadow: none;
    }

    button.ok {
      background: #bdd600; color: #172a55;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .form {
      padding: 16px;
      display: grid;
      grid-template-columns: 130px 120px 120px 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
      border-top: 5px solid #172a55;
    }

    label {
      display: block;
      font-size: 12px;
      color: #172a55;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .days {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .day {
      overflow: hidden;
      min-height: 240px;
    }

    .day-head {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #ffffff;
    }

    .day h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: -.02em;
      color: #172a55;
    }

    .count {
      font-size: 12px;
      color: #4b5f00;
      font-weight: 800;
      background: #eef7c6;
      border-radius: 999px;
      padding: 5px 9px;
    }

    .item {
      position: relative;
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
    }

    .item:last-child {
      border-bottom: 0;
    }

    .time-pill {
      align-self: start;
      width: 118px;
      min-width: 118px;
      max-width: 118px;
      border-radius: 8px;
      padding: 9px 7px;
      text-align: center;
      font-weight: 800;
      color: #172a55;
      background: #eef7c6;
      border: 1px solid #d7e889;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: .1px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: nowrap;
      overflow: visible;
    }

    .title-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      font-weight: 800;
      font-size: 16px;
      margin: 0 0 5px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .actions button,
    .actions .button {
      padding: 8px 10px;
      border-radius: 11px;
      font-size: 13px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .tips {
      margin-top: 16px;
      padding: 16px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    code {
      background: rgba(148, 163, 184, .18);
      padding: 2px 6px;
      border-radius: 7px;
      color: var(--text);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: .25s ease;
      background: #111827;
      color: white;
      padding: 12px 14px;
      border-radius: 999px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, .2);
      z-index: 10;
      font-weight: 800;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      .hero-inner {
        grid-template-columns: 1fr;
      }

      .hero-art {
        display: none;
      }

      .form {
        grid-template-columns: 1fr 1fr;
      }

      .days {
        grid-template-columns: 1fr;
      }
    }

      .hero-art {
        min-height: 250px;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar input {
        grid-column: 1 / -1;
      }

      .form {
        grid-template-columns: 1fr 1fr;
      }

      .days {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .hero {
        padding: 0 10px 14px;
      }

      .hero-copy {
        padding: 18px 16px;
      }

      .form {
        grid-template-columns: 1fr 1fr;
        padding: 12px;
      }

      .full {
        grid-column: 1 / -1;
      }

      .item {
        grid-template-columns: 112px 1fr;
        padding: 12px;
      }

      .time-pill {
        width: 100px;
        min-width: 100px;
        max-width: 100px;
        font-size: 11px;
        padding: 8px 6px;
      }

      .actions button,
      .actions .button {
        width: auto;
      }

      button,
      .button {
        width: 100%;
      }
    }

      .hero-copy {
        padding: 20px;
      }

      .toolbar {
        position: static;
      }

      .form {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 132px 1fr;
        padding: 14px;
      }

      button,
      .button {
        width: 100%;
      }

      .actions button,
      .actions .button {
        width: auto;
      }
    }

    @media (max-width: 380px) {
      .item {
        grid-template-columns: 104px 1fr;
      }

      .time-pill {
        width: 94px;
        min-width: 94px;
        max-width: 94px;
        font-size: 10px;
      }
    }

      .time-pill {
        width: 124px;
        min-width: 124px;
        max-width: 124px;
        font-size: 13px;
        padding: 10px 6px;
      }
    }

  </style>
</head>

  <main>
    <section class="toolbar glass">

    <section class="tips glass">
      <b>안내:</b> 일정은 Google Sheets에 저장됩니다. 가족이 추가/수정한 내용은 새로고침 후 함께 확인할 수 있습니다.
    </section>

  <div id="toast" class="toast"></div>

  <script>
    const KEY = "nagoya-family-trip-2026-v2";
    const API_URL = "https://script.google.com/macros/s/AKfycby0FcDhO69qMok8RCC3UBhCf_q-x5AnjVFkRpEXmsdVvdWAgAcO2sijj36KEx9Gnj90/exec";
    const THEME_KEY = "nagoya-theme";
    const DAYS = [
      ["2026-06-19", "6/19 금요일 · 1일차"],
      ["2026-06-20", "6/20 토요일 · 2일차"],
      ["2026-06-21", "6/21 일요일 · 3일차"],
      ["2026-06-22", "6/22 월요일 · 4일차"]
    ];

    let cachedItems = [];
    let isFirstLoad = true;

    function displayTimeRange(item) {
      const start = item.time || "--:--";
      const end = item.endTime || "";
      return end ? `${start} ~ ${end}` : start;
    }

    async function load() {
      const res = await fetch(API_URL, { cache: "no-store" });
      const data = await res.json();

      cachedItems = data.sort((a, b) =>
        String(a.date + a.time).localeCompare(String(b.date + b.time))
      );

      isFirstLoad = false;
      return cachedItems;
    }

    function sortItems(items) {
      return items.sort((a, b) =>
        String(a.date + a.time).localeCompare(String(b.date + b.time))
      );
    }

    async function addToServer(item) {
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(item)
      });
    }
    // function save(items) {
    //   localStorage.setItem(KEY, JSON.stringify(items));
    //   render();
    // }
    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1600);
    }
    function mapsUrl(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (text.startsWith("http://") || text.startsWith("https://")) return text;
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(text);
    }
    async function addItem() {
      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value || "",
        endTime: document.getElementById("endTime").value || "",
        title: document.getElementById("title").value.trim(),
        map: document.getElementById("map").value.trim(),
        memo: document.getElementById("memo").value.trim()
      };
      if (!item.title) {
        toast("장소/일정명을 입력해주세요.");
        return;
      }

      if (item.endTime && item.endTime < item.time) {
        toast("종료시간은 시작시간보다 늦게 선택해주세요.");
        return;
      }
      // const items = load();
      // items.push(item);
      // items.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
      // save(items);
      cachedItems.push(item);
      sortItems(cachedItems);
      renderFromCache();

      document.getElementById("endTime").value = "";
      document.getElementById("title").value = "";
      document.getElementById("map").value = "";
      document.getElementById("memo").value = "";
      toast("일정을 추가했어요. 동기화 중...");

      try {
        await addToServer(item);
        await load();
        renderFromCache();
        toast("Google Sheets에 저장됐어요.");
      } catch (error) {
        cachedItems = cachedItems.filter(x => String(x.id) !== String(item.id));
        renderFromCache();
        toast("저장 실패. 잠시 후 다시 시도해주세요.");
      }
    }
    async function deleteItem(id) {
      if (!confirm("이 일정을 삭제할까요?")) return;

      const before = [...cachedItems];
      cachedItems = cachedItems.filter(x => String(x.id) !== String(id));
      renderFromCache();
      toast("삭제했어요. 동기화 중...");

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "delete",
            id
          })
        });

        await load();
        renderFromCache();
        toast("Google Sheets에 반영됐어요.");
      } catch (error) {
        cachedItems = before;
        renderFromCache();
        toast("삭제 실패. 잠시 후 다시 시도해주세요.");
      }
    }

    async function deleteAllFromServer() {
      const items = await load();
      for (const item of items) {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "delete",
            id: item.id
          })
        });
      }
    }

    async function editItem(id) {
      const items = await load();
      const item = items.find(x => String(x.id) === String(id));
      if (!item) return;

      document.getElementById("date").value = item.date;
      document.getElementById("time").value = item.time;
      document.getElementById("endTime").value = item.endTime || "";
      document.getElementById("title").value = item.title;
      document.getElementById("map").value = item.map;
      document.getElementById("memo").value = item.memo;

      const before = [...cachedItems];
      cachedItems = cachedItems.filter(x => String(x.id) !== String(id));
      renderFromCache();

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "delete",
            id
          })
        });
        await load();
        renderFromCache();
      } catch (error) {
        cachedItems = before;
        renderFromCache();
        toast("수정 준비 실패. 다시 시도해주세요.");
        return;
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
      toast("위 입력창에서 수정 후 다시 추가하세요.");
    }
    function copyMap(value) {
      navigator.clipboard.writeText(mapsUrl(value)).then(() => toast("지도 링크를 복사했어요."));
    }
    async function exportJson() {
      const items = await load();
      const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "nagoya-trip-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    }
    function importJson(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("not array");

          if (!confirm("현재 스프레드시트 일정을 지우고 백업 파일로 교체할까요?")) return;

          await deleteAllFromServer();
          for (const item of data) {
            await addToServer({
              id: item.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
              date: item.date || "",
              time: item.time || "",
              endTime: item.endTime || "",
              title: item.title || "",
              map: item.map || "",
              memo: item.memo || ""
            });
          }

          await load();
          renderFromCache();
          toast("백업을 불러왔어요.");
        } catch {
          toast("JSON 파일 형식이 올바르지 않습니다.");
        }
      };
      reader.readAsText(file);
    }
    async function seedSample() {
      const sample = [
        { id: "s1", date: "2026-06-19", time: "11:00", endTime: "", title: "중부국제공항 도착", map: "Chubu Centrair International Airport", memo: "입국 후 교통패스/유심 확인" },
        { id: "s2", date: "2026-06-19", time: "14:00", endTime: "", title: "나고야역 근처 호텔 체크인", map: "Nagoya Station", memo: "짐 맡기고 늦은 점심" },
        { id: "s3", date: "2026-06-19", time: "18:00", endTime: "", title: "사카에 야경 산책", map: "Sakae Nagoya", memo: "오아시스21 / TV타워 근처" },
        { id: "s4", date: "2026-06-20", time: "10:00", endTime: "", title: "나고야성", map: "Nagoya Castle", memo: "가족사진 포인트" },
        { id: "s5", date: "2026-06-20", time: "13:00", endTime: "", title: "히츠마부시 점심", map: "hitsumabushi Nagoya", memo: "대기 고려" },
        { id: "s6", date: "2026-06-21", time: "10:30", endTime: "", title: "오스 상점가", map: "Osu Shopping District Nagoya", memo: "간식/쇼핑" },
        { id: "s7", date: "2026-06-21", time: "15:00", endTime: "", title: "도요타 산업기술기념관", map: "Toyota Commemorative Museum of Industry and Technology", memo: "어른들도 보기 좋음" },
        { id: "s8", date: "2026-06-22", time: "09:30", endTime: "", title: "체크아웃 및 공항 이동", map: "Chubu Centrair International Airport", memo: "여권/보조배터리/면세 확인" }      ];

      for (const item of sample) {
        await addToServer({
          ...item,
          id: item.id + "-" + Date.now()
        });
      }

      await load();
      renderFromCache();
      toast("예시 일정을 넣었어요.");
    }
    function toggleTheme() {
      const body = document.body;
      const next = body.dataset.theme === "night" ? "day" : "night";
      body.dataset.theme = next;
      localStorage.setItem(THEME_KEY, next);
    }
    async function render() {
      if (isFirstLoad) {
        const root = document.getElementById("days");
        root.innerHTML = `<section class="day glass"><div class="empty">일정을 불러오는 중입니다...</div></section>`;
        await load();
      }
      renderFromCache();
    }

    function renderFromCache() {
      const keyword = document.getElementById("search")?.value.trim().toLowerCase() || "";

      const items = cachedItems
        .filter(x => !keyword || [x.title, x.memo, x.map].join(" ").toLowerCase().includes(keyword));

      const root = document.getElementById("days");
      root.innerHTML = "";
      for (const [date, label] of DAYS) {
        const dayItems = items.filter(x => x.date === date);
        const day = document.createElement("section");
        day.className = "day glass";
        day.innerHTML = `
      <div class="day-head">
        <h2>${label}</h2>
        <span class="count">${dayItems.length}개 일정</span>
      </div>`;
        if (!dayItems.length) {
          day.innerHTML += `<div class="empty">아직 일정이 없습니다. 위 입력창에서 장소를 추가해보세요.</div>`;
        } else {
          for (const item of dayItems) {
            const div = document.createElement("div");
            div.className = "item";
            const mapValue = String(item.map || "").trim();
            const mapActions = mapValue
              ? `<a class="button ghost" target="_blank" rel="noopener" href="${mapsUrl(mapValue)}">🗺️ 지도</a>
                 <button class="ghost" onclick="copyMap('${escapeAttr(mapValue)}')">링크 복사</button>`
              : `<button class="ghost" disabled title="Google Maps 주소가 없습니다.">지도 없음</button>`;
            div.innerHTML = `
          <div class="time-pill">${escapeHtml(displayTimeRange(item))}</div>
          <div>
            <div class="title-row">
              <p class="title">${escapeHtml(item.title)}</p>
            </div>
            <div class="meta">${escapeHtml(item.memo || "메모 없음")}</div>
            <div class="actions">
              ${mapActions}
              <button class="secondary" onclick="editItem('${item.id}')">수정</button>
              <button class="danger" onclick="deleteItem('${item.id}')">삭제</button>
            </div>
          </div>`;
            day.appendChild(div);
          }
        }
        root.appendChild(day);
      }
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[s]));
    }
    function escapeAttr(str) {
      return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }
    document.body.dataset.theme = localStorage.getItem(THEME_KEY) || "day";
    //render();
    window.addEventListener("DOMContentLoaded", () => {
      render();
    });
  </script>
